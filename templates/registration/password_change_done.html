{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swahilipot Hub Portal — Password Changed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1e40af;--navy:#0a1628}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#060e1f,#0a1628,#1e40af 120%);
         font-family:'Inter',system-ui,sans-serif;padding:20px}
    .card{width:min(420px,100%);background:#f9fafb;border-radius:16px;padding:40px 38px;box-shadow:0 24px 80px rgba(0,0,0,.35);text-align:center}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid #e5e7eb}
    .brand-logo{width:60px;height:60px;border-radius:14px;background:#fff;padding:6px;border:1.5px solid #dbeafe;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .brand-logo img{width:100%;height:100%;object-fit:contain}
    .brand-name{font-size:.95rem;font-weight:800;color:var(--navy);text-align:left}
    .brand-tag{font-size:.67rem;color:#6b7280;text-align:left}
    .success-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#dcfce7,#bbf7d0);display:flex;align-items:center;justify-content:center;font-size:2rem;color:#16a34a;margin:0 auto 18px;box-shadow:0 0 0 8px rgba(22,163,74,.1);animation:pop .4s ease}
    @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
    .page-title{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:10px}
    .page-sub{font-size:.87rem;color:#374151;line-height:1.6;margin-bottom:24px}
    .btn-main{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:10px;cursor:pointer;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;font-size:.92rem;font-weight:700;transition:all .3s;font-family:inherit;text-decoration:none;box-shadow:0 4px 16px rgba(30,64,175,.3)}
    .btn-main:hover{transform:translateY(-2px);color:#fff}
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-logo">
      <img src="https://swahilipothub.co.ke/wp-content/uploads/2021/06/Swahilipot-logo-Trans.png" alt="Swahilipot"
           onerror="this.src='{% static 'images/swahilipot-logo.jfif' %}';this.onerror=null">
    </div>
    <div>
      <div class="brand-name">Swahilipot Hub Foundation</div>
      <div class="brand-tag">Organisational Management Portal</div>
    </div>
  </div>
  <div class="success-circle"><i class="bi bi-check-lg"></i></div>
  <div class="page-title">Password Updated!</div>
  <div class="page-sub">Your password has been changed successfully. Use your new password next time you sign in.</div>
  <a href="{% url 'accounts:profile' %}" class="btn-main">
    <i class="bi bi-person-circle"></i>Back to Profile
  </a>
</div>
</body>
</html>
